<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Cookie Clicker</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <section class="container">
    <div class="left">
      <div class="statistics">
        <div class="cookie-stats">
          <div class="cookie-count" id="cookies">0 Cookies</div>
          <div class="cookie-per-second"><span id="cookie-per-second">0</span> cookies per second</div>
        </div>
        <div class="cookie-clicker-img"></div>
      </div>
    </div>
    <div class="middle">
      <h2 class="achievement-title">Achievements</h2>
      <div class="achievements"></div>
    </div>
    <div class="right">
      <div class="shop">
        <h2>Upgrades</h2>
        <div class="powerful-upgrades"></div>

        <h2>Buildings</h2>
        <div class="building-upgrades"></div>
      </div>
    </div>
    <div class="settings">
      <div class="status"> Status: <span id="status">Idle</span></div>
      <div class="version"> Version: <span id="version">1.0.0</span></div>
      <div class="game-title"><span>Cookie Clicker</span></div>
      <div class="last-saved"> Last Saved: <span id="last-saved">Never</span></div>
      <div class="load-status"> Load: <span id="load-status">Never</span></div>
      <button class="btn save">Save</button>
      <button class="btn load">Load</button>
      <button class="btn reset">Reset</button>
    </div>
  </section>
  <script src="script.js"></script>
</body>

</html>
